<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent</title>
    <link rel="stylesheet" href="/static/style.css?v=4" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button onclick="startNewChat()" class="new-chat-btn">
          <i class="fas fa-plus"></i> New Chat
        </button>
      </div>
      <div class="sidebar-content" id="conv-list"></div>
      <div class="sidebar-footer">
        <button class="icon-btn" onclick="openSettingsModal()">
          <i class="fas fa-cog"></i> Settings
        </button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <header>
        <button class="icon-btn" onclick="toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <h1>AI Agent</h1>
        <!-- User Login Button (Top Right) -->
        <button class="user-btn" onclick="openUserModal()">
          <i class="fas fa-user-circle"></i>
          <span id="header-username">Guest</span>
        </button>
      </header>

      <div id="chatbox">
        <div class="message ai welcome">Hello! I am your AI Agent.</div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="user-input" placeholder="Ask anything..." />
          <label class="switch" title="Web Search">
            <input type="checkbox" id="search-toggle" checked />
            <span class="slider"></span>
          </label>
          <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal 1: User Login (Identity) -->
    <div id="user-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeUserModal()">&times;</span>
        <h2><i class="fas fa-user"></i> User Identity</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 15px">
          Enter your name to save chat history. Leave empty for Guest mode.
        </p>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="user-id" placeholder="e.g., Vinayak" />
        </div>
        <button onclick="saveUser()" class="save-btn">Save Identity</button>
      </div>
    </div>

    <!-- Modal 2: Settings (API Config) -->
    <div id="settings-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeSettingsModal()">&times;</span>
        <h2><i class="fas fa-robot"></i> AI Configuration</h2>
        <div class="form-group">
          <label>OpenRouter API Key</label>
          <input type="password" id="api-key" placeholder="sk-or-v1-..." />
        </div>
        <div class="form-group">
          <label>Select Model</label>
          <select id="model-select">
            <option value="stepfun/step-3.5-flash:free">
              StepFun 3.5 Flash (Free)
            </option>
            <option value="meta-llama/llama-3-8b-instruct:free">
              Llama 3 8B (Free)
            </option>
          </select>
        </div>
        <button onclick="saveSettings()" class="save-btn">Save Config</button>
      </div>
    </div>

    <script src="/static/script.js?v=4"></script>
  </body>
</html>
