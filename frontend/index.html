<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button onclick="startNewChat()" class="new-chat-btn">
          <i class="fas fa-plus"></i> New Chat
        </button>
      </div>
      <div class="sidebar-content" id="conv-list"></div>
      <div class="sidebar-footer">
        <button class="settings-btn" onclick="openSettingsModal()">
          <i class="fas fa-cog"></i> Settings
        </button>
      </div>
    </div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
      <header>
        <div class="header-left">
          <button class="icon-btn" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <div class="header-center">
          <h1>AI Agent</h1>
        </div>
        <div class="header-right">
          <button class="user-btn" onclick="openUserModal()">
            <i class="fas fa-user-circle"></i>
            <span id="header-username">Guest</span>
          </button>
        </div>
      </header>

      <div class="chat-container">
        <div id="chatbox">
          <div class="welcome-state">
            <h2>Hello! I am your AI Agent.</h2>
            <p>Ask me anything. I have access to real-time internet search.</p>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="user-input" placeholder="Ask anything..." />
          <label class="switch" title="Web Search">
            <input type="checkbox" id="search-toggle" checked />
            <span class="slider"></span>
          </label>
          <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- User Modal -->
    <div id="user-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeUserModal()">&times;</span>
        <h2>User Identity</h2>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="user-id" placeholder="Enter your name" />
        </div>
        <button onclick="saveUser()" class="save-btn">Save</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeSettingsModal()">&times;</span>
        <h2>Configuration</h2>
        <div class="form-group">
          <label>OpenRouter API Key</label>
          <input type="password" id="api-key" placeholder="sk-or-v1-..." />
        </div>
        <div class="form-group">
          <label>Select Model</label>
          <select id="model-select">
            <option value="stepfun/step-3.5-flash:free">
              StepFun 3.5 Flash (Free)
            </option>
            <option value="meta-llama/llama-3-8b-instruct:free">
              Llama 3 8B (Free)
            </option>
            <option value="custom">Custom Model ID</option>
          </select>
          <!-- THIS WAS MISSING causing the error -->
          <input
            type="text"
            id="custom-model"
            placeholder="Enter Custom Model ID"
            style="display: none; margin-top: 8px"
          />
        </div>
        <button onclick="saveSettings()" class="save-btn">Save</button>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
