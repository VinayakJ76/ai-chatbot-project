<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- Markdown Parser Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeSettings()">&times;</span>
        <h2><i class="fas fa-sliders-h"></i> Settings</h2>

        <div class="form-group">
          <label>Your Name (For Memory)</label>
          <input type="text" id="user-id" placeholder="e.g., Alice" />
        </div>

        <div class="form-group">
          <label>OpenRouter API Key</label>
          <input type="password" id="api-key" placeholder="sk-or-v1-..." />
        </div>

        <div class="form-group">
          <label>Select Model</label>
          <select id="model-select">
            <option value="stepfun/step-3.5-flash:free">
              StepFun 3.5 Flash (Free)
            </option>
            <option value="meta-llama/llama-3-8b-instruct:free">
              Llama 3 8B (Free)
            </option>
            <option value="google/gemma-7b-it:free">Gemma 7B (Free)</option>
            <option value="custom">Custom Model ID</option>
          </select>
          <input
            type="text"
            id="custom-model"
            placeholder="Enter Custom Model ID"
            style="display: none; margin-top: 8px"
          />
        </div>

        <button onclick="saveSettings()" class="save-btn">
          Save & Continue
        </button>
      </div>
    </div>

    <!-- Main App -->
    <div class="container">
      <header>
        <div class="logo-area">
          <i class="fas fa-robot"></i>
          <h1>AI Assistant</h1>
        </div>
        <button class="icon-btn" onclick="openSettings()" title="Settings">
          <i class="fas fa-cog"></i>
        </button>
      </header>

      <div id="chatbox">
        <div class="message ai welcome">
          Hello! I am your personal AI assistant. Configure your settings using
          the <strong>gear icon</strong> above to get started.
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input
            type="text"
            id="user-input"
            placeholder="Type your message here..."
          />
          <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
